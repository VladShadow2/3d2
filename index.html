<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Street View Style</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #panorama {
        width: 100%;
        height: 100%;
      }

      .ground-arrow {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
        transform: translate(-50%, -50%) rotateX(60deg);
        transition: 0.3s;
}
      

      .ground-arrow::after {
        content: "";
        width: 0;
        height: 0;
        border-left: 15px solid transparent;
        border-right: 15px solid transparent;
        border-top: 25px solid white;
      }

      .ground-arrow:hover {
        transform: scale(1.2);
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
      }
    </style>
  </head>

  <body>
   
    <div id="panorama"></div>
    
    <script>
      const viewer = pannellum.viewer("panorama", {
        default: {
          firstScene: "vulucia_y",
          sceneFadeDuration: 1200,
          autoLoad: true,
        },

        scenes: {
          vulucia_y: {
            type: "equirectangular",
            panorama: "school/vulucia_y.jpg",

            hotSpots: [
              {
                pitch: -4.979013952693793,
                yaw: -83.70304492178943,
                type: "custom",
                cssClass: "ground-arrow",
                clickHandlerFunc: () =>
                  viewer.loadScene("livecruloonepoverhcoridor_y"),
              },

              {
                pitch: -3.6331569657008522,
                yaw: 22.006584566389535,
                type: "custom",
                cssClass: "ground-arrow",
                clickHandlerFunc: () =>
                  viewer.loadScene("pravecrulocorudoronepoverh_y"),
              },
            ],
          },

          livecruloonepoverhcoridor_y: {
            type: "equirectangular",
            panorama: "school/livecruloonepoverhcoridor_y.jpg",

            hotSpots: [
              {
                pitch: -19.970970879112873,
                yaw: -98.17425882831044,
                type: "custom",
                cssClass: "ground-arrow",
                clickHandlerFunc: () => viewer.loadScene("vulucia_y"),
              },
            ],
          },
          pravecrulocorudoronepoverh_y: {
            type: "equirectangular",
            panorama: "school/pravecrulocorudoronepoverh_y.jpg",

            hotSpots: [
              {
                pitch: -23.629584409110755,
                yaw: -104.38587209055946,
                type: "custom",
                cssClass: "ground-arrow",
                clickHandlerFunc: () => viewer.loadScene("vulucia_y"),
              },
            ],
          },
        },
      });
      viewer.on("mousedown", function (e) {
        const coords = viewer.mouseEventToCoords(e);
        console.log("pitch:", coords[0], `,`, "yaw:", coords[1]);
      });
    </script>
    
  </body>
</html>
