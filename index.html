<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Моя 360 кімната</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #panorama {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="panorama"></div>

    <script>
      pannellum.viewer("panorama", {
        type: "equirectangular",
        panorama: "Dick.jpg",
        autoLoad: true,
        showZoomCtrl: true,
      });
    </script>
  </body>
</html>
