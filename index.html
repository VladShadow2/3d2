    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      #panorama {
        width: 100%;
        height: 100%;
      }

      .ground-arrow {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
        transform: translate(-50%, -50%) rotateX(60deg);
        transition: 0.3s;
      }

      .ground-arrow::after {
        content: "";
        width: 0;
        height: 0;
        border-left: 15px solid transparent;
        border-right: 15px solid transparent;
        border-top: 25px solid white;
      }

      .ground-arrow:hover {
        transform: scale(1.2);
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
      }
    </style>
  </head>
